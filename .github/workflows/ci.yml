name: CI

on:
  push:
    branches: [main, feat-*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov

    - name: Install Whale1.0
      run: |
        pip install -e .

    - name: Run tests
      run: |
        python -m pytest tests/ -v --cov=whale_video

    - name: Verify import without torch
      run: |
        python -c "
        import sys
        sys.modules['torch'] = type(sys)('fake_torch')
        sys.modules['torch'].cuda = type(sys)('fake_cuda')
        sys.modules['torch'].cuda.is_available = lambda: False
        from whale_video.config import WhaleConfig
        from whale_video.pipeline import T2VPipeline
        cfg = WhaleConfig()
        assert 'wan2.2-t2v' in cfg.list_available_engines()
        print('✅ All imports work without torch!')
        "
